<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- 背景：明亮科技蓝 -->
    <radialGradient id="bgGradient" cx="45%" cy="35%" r="80%" fx="40%" fy="25%">
      <stop offset="0%" stop-color="#4A7DB5" />
      <stop offset="50%" stop-color="#1E3A6F" />
      <stop offset="100%" stop-color="#0A1A30" />
    </radialGradient>

    <!-- 辐条渐变 -->
    <linearGradient id="spokeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0057FF" />
      <stop offset="100%" stop-color="#00C8A0" />
    </linearGradient>

    <!-- 中心圆 -->
    <radialGradient id="hubGradient" cx="40%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#C8D0DC" />
      <stop offset="50%" stop-color="#6E7A94" />
      <stop offset="100%" stop-color="#2A3448" />
    </radialGradient>

    <!-- 玻璃高光 -->
    <linearGradient id="glassHighlight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.28" />
      <stop offset="25%" stop-color="#FFFFFF" stop-opacity="0.08" />
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0" />
    </linearGradient>

    <!-- 边缘光晕 -->
    <linearGradient id="strokeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.40" />
      <stop offset="50%" stop-color="#FFFFFF" stop-opacity="0.08" />
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.20" />
    </linearGradient>

    <!-- 底部内阴影 -->
    <radialGradient id="innerShadow" cx="50%" cy="88%" r="65%">
      <stop offset="0%" stop-color="#000000" stop-opacity="0.35" />
      <stop offset="100%" stop-color="#000000" stop-opacity="0" />
    </radialGradient>

    <!-- macOS 标准圆角矩形裁剪路径 (半径 185.4) -->
    <clipPath id="squircleClip">
      <rect x="0" y="0" width="1024" height="1024" rx="185.4" ry="185.4" />
    </clipPath>
  </defs>

  <!-- 背景层，应用裁剪 -->
  <g clip-path="url(#squircleClip)">
    <rect x="0" y="0" width="1024" height="1024" fill="url(#bgGradient)" />
    <rect x="0" y="0" width="1024" height="1024" fill="url(#innerShadow)" />

    <!-- 核心图形：在 824x824 的有效区域内居中 (四周各留 100px 边距) -->
    <!-- 缩放系数 3.2，将原始图形置于 824x824 的中央区域 -->
    <g transform="translate(512, 512) scale(3.2) translate(-100, -100)">
      <!-- 辐条 1（右上） -->
      <path d="M 100 100
               C 130 90, 150 70, 165 55"
            fill="none" stroke="url(#spokeGradient)" stroke-width="12" stroke-linecap="round" />
      <!-- 辐条 2（右下） -->
      <path d="M 100 100
               C 130 120, 155 135, 170 155"
            fill="none" stroke="url(#spokeGradient)" stroke-width="12" stroke-linecap="round" />
      <!-- 辐条 3（左） -->
      <path d="M 100 100
               C 80 110, 60 120, 40 130"
            fill="none" stroke="url(#spokeGradient)" stroke-width="12" stroke-linecap="round" />

      <!-- 中心圆 -->
      <circle cx="100" cy="100" r="28" fill="url(#hubGradient)" />
      <circle cx="100" cy="100" r="28" fill="none" stroke="#FFFFFF" stroke-opacity="0.15" stroke-width="2" />
      <circle cx="88" cy="88" r="6" fill="#FFFFFF" fill-opacity="0.30" />
    </g>

    <!-- 顶部玻璃高光 -->
    <rect x="0" y="0" width="1024" height="480" fill="url(#glassHighlight)" />
    <!-- 边缘光晕（描边） -->
    <rect x="2" y="2" width="1020" height="1020" rx="185.4" ry="185.4" fill="none" stroke="url(#strokeGradient)" stroke-width="4" />
  </g>
</svg>
