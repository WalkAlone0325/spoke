      <stop offset="100%" stop-color="#02080D" />
    </radialGradient>
    <linearGradient id="spokeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6" />
      <stop offset="100%" stop-color="#10B981" />
    </linearGradient>
    <radialGradient id="hubGradient" cx="40%" cy="35%" r="55%">
